<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Your Orders — UglyFresh</title>
  <meta name="description" content="View and manage your UglyFresh orders.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Orders-specific styles that complement style.css */
    .orders-hero {
      background: linear-gradient(135deg, var(--green-50), #d1fae5);
      padding: 36px 24px 24px;
      border-bottom: 1px solid var(--green-100);
    }
    .orders-hero h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--green-700);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .orders-hero p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .orders-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .search-row input {
      flex: 1;
      padding: 10px 16px;
      border-radius: var(--radius-sm, 8px);
      border: 1.5px solid var(--border, #e2e8e4);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: 0.2s;
      background: white;
      color: var(--text, #1a2e1c);
    }
    .search-row input:focus {
      border-color: var(--green-500, #22c55e);
      box-shadow: 0 0 0 3px rgba(34,197,94,0.1);
    }
    .search-row button {
      padding: 10px 18px;
      border-radius: var(--radius-sm, 8px);
      border: 1.5px solid var(--border, #e2e8e4);
      background: white;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
      color: var(--text-muted, #6b7280);
    }
    .search-row button:hover {
      background: var(--green-50, #f0fdf4);
      border-color: var(--green-300, #86efac);
      color: var(--green-700, #15803d);
    }

    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: white;
      border: 1px solid var(--border, #e2e8e4);
      border-radius: var(--radius-md, 14px);
      box-shadow: var(--shadow-sm, 0 1px 4px rgba(0,0,0,0.06));
      gap: 16px;
      transition: 0.2s;
    }
    .order-item:hover {
      border-color: var(--green-200, #bbf7d0);
      box-shadow: var(--shadow-md, 0 4px 16px rgba(0,0,0,0.09));
    }

    .order-meta {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .order-thumb {
      width: 58px;
      height: 58px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--green-50);
    }
    .order-info .order-id {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--text, #1a2e1c);
    }
    .order-status {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 50px;
      margin-left: 8px;
      background: var(--green-100);
      color: var(--green-700);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .order-status.cancelled {
      background: #fee2e2;
      color: var(--red-dark, #dc2626);
    }
    .order-desc {
      font-size: 13px;
      color: var(--text-muted, #6b7280);
      margin-top: 3px;
    }

    .order-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .order-actions .btn-details {
      padding: 7px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: white;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      color: var(--text-muted);
    }
    .order-actions .btn-details:hover {
      background: var(--green-50);
      border-color: var(--green-400);
      color: var(--green-700);
    }
    .order-actions .btn-cancel {
      padding: 7px 14px;
      border-radius: 8px;
      border: none;
      background: #fef2f2;
      color: var(--red, #ef4444);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .order-actions .btn-cancel:hover {
      background: var(--red, #ef4444);
      color: white;
    }
    .order-actions .btn-cancel:disabled {
      background: #f3f4f6;
      color: #9ca3af;
      cursor: default;
    }

    .empty-orders {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 16px;
    }
    .empty-orders span { font-size: 48px; display: block; margin-bottom: 16px; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(4px);
    }
    .modal-box {
      width: 680px;
      max-width: 95%;
      background: white;
      border-radius: 20px;
      padding: 28px 28px 24px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.18);
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-box h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--green-700);
      margin-bottom: 16px;
    }
    .modal-item-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .modal-item-row:last-of-type { border-bottom: none; }
    .modal-item-img {
      width: 68px; height: 68px;
      object-fit: cover;
      border-radius: 10px;
      flex-shrink: 0;
      background: var(--green-50);
    }
    .modal-item-name { font-weight: 700; font-size: 15px; margin-bottom: 3px; }
    .modal-item-price { font-size: 13px; color: var(--text-muted); }
    .modal-total {
      font-family: 'Outfit', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--green-700);
      margin-top: 14px;
      text-align: right;
    }
    .modal-customer {
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--green-50);
      border-radius: 10px;
      font-size: 13.5px;
    }
    .modal-customer strong { display: block; margin-bottom: 4px; color: var(--text); }
    .modal-trace {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .modal-close-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
    }
    .modal-close-btn {
      padding: 9px 20px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: white;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }
    .modal-close-btn:hover { background: var(--green-50); border-color: var(--green-400); }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <h1>🌱 UglyFresh</h1>
    <div class="nav-buttons">
      <a href="index.html" class="cart-btn">🏠 Home</a>
      <a href="cart.html"  class="cart-btn">🛒 Cart</a>
    </div>
  </nav>

  <!-- Hero -->
  <div class="orders-hero">
    <h1>📦 Your Orders</h1>
    <p>View, track, and manage all your placed orders.</p>
  </div>

  <!-- Content -->
  <div class="orders-wrapper">
    <div class="search-row">
      <input id="orders-search" type="text" placeholder="🔍  Search by order ID, product, name, or phone…">
      <button onclick="document.getElementById('orders-search').value=''; renderOrders();">Clear</button>
    </div>
    <div id="orders-list" class="orders-list"></div>
  </div>

  <!-- Footer -->
  <footer>
    © 2025 <strong>UglyFresh</strong> | Eat Different. Waste Less.
  </footer>

  <script>
    function fmt(n){ return Number(n||0).toFixed(2); }

    function getProductImages(){
      try { return JSON.parse(localStorage.getItem('productImages')||'{}'); } catch(e){ return {}; }
    }

    function renderOrders(){
      const el  = document.getElementById('orders-list');
      const all = JSON.parse(localStorage.getItem('orders')||'[]').slice().reverse();
      const q   = (document.getElementById('orders-search')?.value||'').trim().toLowerCase();
      let list  = q ? all.filter(o => {
        return [o.id, o.product, o.customer?.name, o.customer?.phone, o.trackingId]
          .join(' ').toLowerCase().includes(q);
      }) : all;

      if (!list.length) {
        el.innerHTML = `<div class="empty-orders"><span>📭</span>No orders found.</div>`;
        return;
      }

      el.innerHTML = '';
      const pImg = getProductImages();

      list.forEach(o => {
        const item = document.createElement('div');
        item.className = 'order-item';

        // thumbnail
        let imgSrc = '';
        try {
          if (o.items?.length) imgSrc = o.items[0].image || pImg[o.items[0].id] || '';
          else imgSrc = o.productImage || (o.productId ? pImg[o.productId] : '') || '';
        } catch(e){}

        const prodText = o.product
          ? `${o.product} × ${o.qty||1}`
          : (o.items?.map(it => `${it.name} ×${it.qty}`).join(', ') || '');

        const statusClass = o.status === 'cancelled' ? 'cancelled' : '';

        item.innerHTML = `
          <div class="order-meta">
            <img class="order-thumb" src="${imgSrc}" alt="" onerror="this.style.display='none'">
            <div class="order-info">
              <div class="order-id">
                ${o.id}
                <span class="order-status ${statusClass}">${o.status || 'placed'}</span>
              </div>
              <div class="order-desc">${prodText} — ₹${fmt(o.total)}</div>
            </div>
          </div>
          <div class="order-actions">
            <button class="btn-details" onclick="showOrderDetails('${o.id}')">Details</button>
            ${o.status === 'cancelled'
              ? `<button class="btn-cancel" disabled>Cancelled</button>`
              : `<button class="btn-cancel" onclick="cancelOrder('${o.id}')">Cancel</button>`
            }
          </div>
        `;
        el.appendChild(item);
      });
    }

    function showOrderDetails(id) {
      const orders = JSON.parse(localStorage.getItem('orders')||'[]');
      const o = orders.find(x => x.id === id);
      if (!o) { alert('Order not found'); return; }
      const pImg = getProductImages();

      let itemsHTML = '';
      if (o.items?.length) {
        o.items.forEach(it => {
          const src = it.image || pImg[it.id] || '';
          itemsHTML += `
            <div class="modal-item-row">
              <img class="modal-item-img" src="${src}" alt="${it.name}" onerror="this.style.display='none'">
              <div>
                <div class="modal-item-name">${it.name}</div>
                <div class="modal-item-price">₹${fmt(it.price)} × ${it.qty} = ₹${fmt(it.total)}</div>
              </div>
            </div>`;
        });
      } else {
        const src = o.productImage || (o.productId ? pImg[o.productId] : '') || '';
        itemsHTML = `
          <div class="modal-item-row">
            <img class="modal-item-img" src="${src}" alt="${o.product||''}" onerror="this.style.display='none'">
            <div>
              <div class="modal-item-name">${o.product||''}</div>
              <div class="modal-item-price">₹${fmt(o.price||o.total||0)} × ${o.qty||1}</div>
            </div>
          </div>`;
      }

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-box">
          <h3>Order ${o.id}</h3>
          <div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">
            Status: <strong style="color:${o.status==='cancelled'?'var(--red)':'var(--green-700)'}">
              ${o.status||'placed'}
            </strong>
          </div>
          ${itemsHTML}
          <div class="modal-total">Total: ₹${fmt(o.total)}</div>
          ${o.customer ? `
          <div class="modal-customer">
            <strong>${o.customer.name||''}</strong>
            ${o.customer.phone||''}<br>
            ${o.customer.address||''} ${o.customer.pincode ? '('+o.customer.pincode+')' : ''}
          </div>` : ''}
          <div class="modal-trace">
            Placed: ${o.createdAt ? new Date(o.createdAt).toLocaleString() : 'N/A'}
            ${o.trackingId ? ' &nbsp;|&nbsp; Tracking: '+o.trackingId : ''}
          </div>
          <div class="modal-close-row">
            <button class="modal-close-btn" onclick="this.closest('.modal-overlay').remove()">Close</button>
          </div>
        </div>`;
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);
    }

    function cancelOrder(id) {
      if (!confirm('Cancel order ' + id + '?')) return;
      const orders = JSON.parse(localStorage.getItem('orders')||'[]');
      const idx = orders.findIndex(x => x.id === id);
      if (idx === -1) { alert('Order not found'); return; }
      orders[idx].status = 'cancelled';
      orders[idx].cancelledAt = new Date().toISOString();
      localStorage.setItem('orders', JSON.stringify(orders));
      renderOrders();
    }

    document.addEventListener('input', e => {
      if (e.target?.id === 'orders-search') renderOrders();
    });
    document.addEventListener('DOMContentLoaded', renderOrders);
  </script>
</body>
</html>
